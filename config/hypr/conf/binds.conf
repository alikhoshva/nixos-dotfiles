# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# SUPER key
$mainMod = SUPER
	
# Actions
bind = $mainMod, RETURN, exec, kitty # Open Alactritty
bind = $mainMod, Q, killactive # Close current window
bind = $mainMod, M, exit # Exit Hyprland
bind = $mainMod, E, exec, thunar # Opens the filemanager
bind = $mainMod, T, togglefloating # Toggle between tiling and floating window
bind = $mainMod, F, fullscreen # Open the window in fullscreen
#bind = $mainMod, SPACE, exec, wofi --show drun --conf ~/.config/wofi/config.conf --style ~/.config/wofi/style.css
bind = $mainMod, SPACE, exec, bash -c "pkill wofi; wofi --show drun --conf ~/.config/wofi/config.conf --style ~/.config/wofi/style.css"
#bind = $mainMod, SPACE, exec, anyrun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, B, exec, zen-twilight# Opens the browser
bind = $mainMod, C, exec, code
#bind = $mainMod SHIFT, B, exec, bash /home/aleks/.config/scripts/reload-waybar.sh # Reload Waybar
#bind = $mainMod, R, exec, bash /home/aleks/.config/scripts/start-rstudio.sh
#bind = $mainMod SHIFT, R, exec, bash /home/aleks/.config/scripts/stop-rstudio.sh
bind = $mainMod SHIFT, W, exec, bash /home/aleks/.config/scripts/wallpaper.sh # Reload hyprpaper after a changing the wallpaper
bind = $mainMod SHIFT, D, exec, grim -g "$(slurp)" - | tee "$HOME/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S_grim.png')" | wl-copy && notify-send "Screenshot Snipped" "Saved to Pictures and copied to clipboard."

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#bindel = ,XF86AudioRaiseVolume, exec, bash /home/aleks/.config/scripts/volume-control.sh up 5
#bindel = ,XF86AudioLowerVolume, exec, bash /home/aleks/.config/scripts/volume-control.sh down 5
#bindel = ,XF86AudioMute, exec, bash /home/aleks/.config/scripts/volume-control.sh mute

bindel = ,XF86AudioMicMute, exec, bash /home/aleks/.config/scripts/toggle-mic.sh
#bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l # Move focus left
bind = $mainMod, right, movefocus, r # Move focus right
bind = $mainMod, up, movefocus, u # Move focus up
bind = $mainMod, down, movefocus, d # Move focus down

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1 # Switch to workspace 1
bind = $mainMod, 2, workspace, 2 # Switch to workspace 2
bind = $mainMod, 3, workspace, 3 # Switch to workspace 3
bind = $mainMod, 4, workspace, 4 # Switch to workspace 4
bind = $mainMod, 5, workspace, 5 # Switch to workspace 5
bind = $mainMod, 6, workspace, 6 # Switch to workspace 6
bind = $mainMod, 7, workspace, 7 # Switch to workspace 7
bind = $mainMod, 8, workspace, 8 # Switch to workspace 8
bind = $mainMod, 9, workspace, 9 # Switch to workspace 9
bind = $mainMod, 0, workspace, 10 # Switch to workspace 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 #  Move window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 #  Move window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 #  Move window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 #  Move window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 #  Move window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 #  Move window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 #  Move window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 #  Move window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 #  Move window to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #  Move window to workspace 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1 # Scroll workspaces 
bind = $mainMod, mouse_up, workspace, e-1 # Scroll workspaces

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow # Move window
bindm = $mainMod, mouse:273, resizewindow # Resize window

bind = $mainMod, H, exec, hyprctl --batch "keyword monitor HDMI-A-1,3840x2160@120,0x0,1.5; keyword monitor eDP-1,disable"
bind = $mainMod, G, exec, hyprctl --batch "keyword monitor HDMI-A-1,1920x1080@120,0x0,1.0"

# Switch to INTERNAL monitor only (eDP-1)
bind = $mainMod SHIFT, H, exec, hyprctl --batch "keyword monitor eDP-1,1920x1200@60,0x0,1.5; keyword monitor HDMI-A-1,disable"

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
