background {
    monitor =
    path = $HOME/nixos-dotfiles/config/assets/lock.jpg
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2 
    dots_spacing = 0.2 
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>󰌾 Password...</i> 
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = Fira Semibold
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 25
    font_family = Fira Semibold
    position = 0, 30
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

label {
    monitor =
    text =  $USER
    color = rgba(255, 255, 255, 0.5)
    font_size = 18
    font_family = Fira Semibold
    position = 0, -30
    halign = center
    valign = center
}
